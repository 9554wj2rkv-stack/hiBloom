<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500&display=swap');
    </style>
  </defs>

  <!-- White background -->
  <rect width="400" height="200" fill="#ffffff"/>

  <!-- hi — light weight, muted -->
  <text
    x="112"
    y="112"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="300"
    fill="#c4a8b0"
    letter-spacing="-2"
    text-anchor="end"
  >hi</text>

  <!-- Bloom — medium weight, burgundy -->
  <text
    x="116"
    y="112"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="500"
    fill="#6b1e35"
    letter-spacing="-2"
    text-anchor="start"
  >Bloom</text>

  <!-- Rose dot -->
  <circle cx="335" cy="100" r="6" fill="#c0566e"/>

  <!-- Fine rule -->
  <line x1="80" y1="126" x2="320" y2="126" stroke="#e0cdd4" stroke-width="0.5"/>

  <!-- Tagline -->
  <text
    x="200"
    y="148"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="400"
    fill="#9a7a84"
    letter-spacing="4"
    text-anchor="middle"
  >EMBRACE YOUR NEW SEASON</text>

</svg>
